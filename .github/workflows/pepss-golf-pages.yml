name: Deploy PEPSS Golf page to GitHub Pages

on:
  push:
    branches:
      - claude/pepss-golf-signup-tyXrm
      - main
    paths:
      - "pepss-golf/**"
      - ".github/workflows/pepss-golf-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages (auto-enable)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact (pepss-golf folder as site root)
        uses: actions/upload-pages-artifact@v3
        with:
          path: pepss-golf

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
