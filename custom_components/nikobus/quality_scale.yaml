rules:
  # Bronze
  action-setup: done
  appropriate-polling: done
  brands:
    status: exempt
    comment: HACS custom component — brand is published with the repo.
  common-modules: done
  config-flow: done
  config-flow-test-coverage:
    status: done
    comment: |
      tests/test_config_flow.py covers the full matrix — success,
      cannot_connect, unknown, already_configured (duplicate unique_id),
      the hardware branch (feedback module vs polling step), reconfigure
      (success + failure keeps the entry untouched) and the options menu —
      against stub flow handlers returning HA-shaped FlowResult dicts.
  dependency-transparency: done
  docs-actions: done
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  entity-category: done
  entity-disabled-by-default: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow:
    status: exempt
    comment: |
      The Nikobus PC-Link bridge has no authentication; the integration
      only opens a serial or raw TCP socket.
  test-coverage:
    status: done
    comment: |
      Core flows, the config/options/reconfigure flow matrix
      (test_config_flow.py), per-platform entity creation through the
      real router (test_platform_setup.py), diagnostics
      (test_diagnostics_quality.py), config-entry migration
      (test_migration.py) and storage failure handling are all covered —
      420+ tests against the stub-based harness in tests/conftest.py.

  # Gold
  devices: done
  diagnostics: done
  discovery:
    status: exempt
    comment: |
      The PC-Link bridge exposes no discoverable service (no mDNS /
      SSDP / USB vendor-specific descriptor) — users enter the serial
      device or TCP endpoint manually.
  discovery-update-info:
    status: exempt
    comment: See `discovery`.
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices: done
  entity-device-class: done
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow: done
  repair-issues: done
  stale-devices: done

  # Platinum
  async-dependency: done
  inject-websession:
    status: exempt
    comment: |
      The Nikobus protocol runs over a serial/TCP link, not HTTP.
  strict-typing:
    status: todo
    comment: |
      py.typed marker is in place and mypy.ini declares strict mode for
      custom_components.nikobus.* (the vendored access_parser is excluded,
      same as in ruff). Code-side: PEP 585/604 forms used throughout,
      asyncio.Task[None] generics declared, broad except blocks re-raise
      CancelledError, ad-hoc Any removed in favour of typed Event /
      NikobusDataCoordinator / CALLBACK_TYPE.

      `mypy --strict` over our code reports ~151 diagnostics. The majority
      (~100: subclassing Any HA base classes, the untyped @callback
      decorator, Any returns/attribute access from HA types) can only be
      resolved with an installed HA package and clear in HA core's
      strict-typing CI. The rest (~50: a handful of bare-generic
      annotations — dict/set/list/frozenset/tuple without parameters —
      and Mapping-vs-dict argument widening on the entity constructors)
      are resolvable here and tracked as a follow-up typing pass.
