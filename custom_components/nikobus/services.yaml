query_module_inventory:
  fields:
    module_address:
      example: "05"
      required: false
      selector:
        text:

send_button_press:
  fields:
    address:
      example: "84DFFC"
      required: true
      selector:
        text:

detect_stale_inventory:
  fields:
    timeout:
      example: 0.6
      required: false
      default: 0.6
      selector:
        number:
          min: 0.1
          max: 5.0
          step: 0.1
          unit_of_measurement: "s"

purge_stale_inventory:
  fields:
    addresses:
      example: "['CCDD', 'EEFF']"
      required: true
      selector:
        object:
