query_module_inventory:
  fields:
    module_address:
      example: "05"
      required: false
      selector:
        text:
    register_start:
      example: "0x70"
      required: false
      selector:
        text:
    register_end:
      example: "0x83"
      required: false
      selector:
        text:
    sub_byte:
      example: "04"
      required: false
      selector:
        select:
          options:
            - label: "04 — output link table (default)"
              value: "04"
            - label: "00 — module header / identity"
              value: "00"
            - label: "01 — BP-cell records / vendor map"
              value: "01"
          custom_value: true

send_button_press:
  fields:
    address:
      example: "84DFFC"
      required: true
      selector:
        text:

detect_stale_inventory:
  fields:
    outer_attempts:
      example: 1
      required: false
      default: 1
      selector:
        number:
          min: 1
          max: 3
          step: 1
    outer_delay:
      example: 0
      required: false
      default: 0
      selector:
        number:
          min: 0
          max: 10
          step: 0.5
          unit_of_measurement: "s"

purge_stale_inventory:
  fields:
    addresses:
      example: "['CCDD', 'EEFF']"
      required: true
      selector:
        object:
