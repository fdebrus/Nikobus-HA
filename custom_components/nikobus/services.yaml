query_module_inventory:
  fields:
    module_address:
      example: "05"
      required: false
      selector:
        text:

send_button_press:
  fields:
    address:
      example: "84DFFC"
      required: true
      selector:
        text:

detect_stale_inventory:
  fields:
    outer_attempts:
      example: 1
      required: false
      default: 1
      selector:
        number:
          min: 1
          max: 3
          step: 1
    outer_delay:
      example: 0
      required: false
      default: 0
      selector:
        number:
          min: 0
          max: 10
          step: 0.5
          unit_of_measurement: "s"

purge_stale_inventory:
  fields:
    addresses:
      example: "['CCDD', 'EEFF']"
      required: true
      selector:
        object:
